name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  embed-src:
    name: Embed-src
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: urmzd/embed-src@v3
        with:
          commit-message: "chore: sync embedded files [skip ci]"

  ci:
    needs: embed-src
    uses: ./.github/workflows/ci.yml

  release:
    name: Release
    needs: [ci, embed-src]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: dtolnay/rust-toolchain@stable

      - name: Release
        id: sr
        uses: urmzd/semantic-release@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Cargo.lock
        if: steps.sr.outputs.released == 'true'
        run: |
          cargo update --workspace
          git add Cargo.lock
          git diff --staged --quiet || git commit -m "chore: sync Cargo.lock [skip ci]"
          git push

    outputs:
      released: ${{ steps.sr.outputs.released }}
      tag: ${{ steps.sr.outputs.tag }}

  publish:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p oag-core --allow-dirty
          sleep 30
          cargo publish -p oag-node-client --allow-dirty
          sleep 30
          cargo publish -p oag-react-swr-client --allow-dirty
          sleep 30
          cargo publish -p oag-fastapi-server --allow-dirty
          sleep 30
          cargo publish -p oag-cli --allow-dirty

  build:
    needs: release
    if: needs.release.outputs.released == 'true'
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: false
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-15
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p oag-cli
          else
            cargo build --release --target ${{ matrix.target }} -p oag-cli
          fi
        shell: bash

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          if [ -f "target/${{ matrix.target }}/release/oag.exe" ]; then
            cp "target/${{ matrix.target }}/release/oag.exe" "oag-${{ matrix.target }}.exe"
            gh release upload "$TAG" "oag-${{ matrix.target }}.exe" --clobber
          else
            cp "target/${{ matrix.target }}/release/oag" "oag-${{ matrix.target }}"
            chmod +x "oag-${{ matrix.target }}"
            gh release upload "$TAG" "oag-${{ matrix.target }}" --clobber
          fi
        shell: bash
