[output]
dir = "./doc"
formats = [{ output_type = "gif" }]

[[scenes]]
type = "terminal"
name = "demo"
theme = "dracula"
cols = 100
rows = 30
cwd = "/tmp/oag-demo"
formats = [{ output_type = "gif" }]
frame_duration = 120

[scenes.intro]
text = """
╭──────────────────────────────────────────────╮
│                                              │
│        ✦  OpenAPI Generator (oag)  ✦         │
│                                              │
│         github.com/urmzd · urmzd.com         │
│                                              │
╰──────────────────────────────────────────────╯
"""
duration = 1500
center = true

# Validate a spec
[[scenes.interactions]]
type = "type"
text = "oag validate -i $SPEC"
speed = 20

[[scenes.interactions]]
type = "key"
key = "enter"

[[scenes.interactions]]
type = "wait"
duration = 500

# Init + generate
[[scenes.interactions]]
type = "type"
text = "oag init && oag generate -i $SPEC"
speed = 20

[[scenes.interactions]]
type = "key"
key = "enter"

[[scenes.interactions]]
type = "wait"
duration = 500

# Preview generated types
[[scenes.interactions]]
type = "type"
text = "head -n 25 src/generated/node/src/types.ts"
speed = 20

[[scenes.interactions]]
type = "key"
key = "enter"

[[scenes.interactions]]
type = "wait"
duration = 800

# Preview generated client
[[scenes.interactions]]
type = "type"
text = "head -n 30 src/generated/node/src/client.ts"
speed = 20

[[scenes.interactions]]
type = "key"
key = "enter"

[[scenes.interactions]]
type = "wait"
duration = 800
